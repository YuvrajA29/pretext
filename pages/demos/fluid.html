<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fluid Typography</title>
    <style>
      :root {
        color-scheme: light;
        --page: #f5f1ea;
        --panel: #fffdf8;
        --ink: #201b18;
        --muted: #6d645d;
        --rule: #d8cec3;
        --accent: #955f3b;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        min-height: 100%;
        background: linear-gradient(180deg, #fbf7f0 0%, var(--page) 100%);
        color: var(--ink);
        font-family: "Helvetica Neue", Helvetica, Arial, sans-serif;
      }

      body {
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 32px 16px 56px;
      }

      .header {
        width: 100%;
        max-width: 800px;
        margin-bottom: 20px;
      }

      .eyebrow {
        margin: 0 0 6px;
        font: 11px/1.2 "SF Mono", ui-monospace, monospace;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--accent);
      }

      h1 {
        margin: 0 0 8px;
        font: 700 28px/1.1 Georgia, "Times New Roman", serif;
      }

      .hint {
        margin: 0;
        font-size: 14px;
        color: var(--muted);
        line-height: 1.55;
        max-width: 60ch;
      }

      canvas {
        display: block;
        cursor: default;
        border-radius: 14px;
        box-shadow:
          0 2px 0 rgba(255, 255, 255, 0.7) inset,
          0 24px 56px rgba(32, 27, 24, 0.13);
        max-width: 100%;
      }

      .controls {
        display: flex;
        gap: 8px;
        margin-top: 14px;
        align-items: center;
        width: 100%;
        max-width: 800px;
        flex-wrap: wrap;
      }

      button {
        padding: 7px 16px;
        border: 1px solid var(--rule);
        border-radius: 999px;
        background: var(--panel);
        color: var(--ink);
        font: 13px/1 "Helvetica Neue", Helvetica, Arial, sans-serif;
        cursor: pointer;
        transition:
          background 140ms,
          border-color 140ms,
          color 140ms;
        user-select: none;
      }

      button:hover {
        background: color-mix(in srgb, var(--panel) 80%, var(--accent) 20%);
        border-color: var(--accent);
      }

      button.active {
        background: var(--accent);
        color: #f5f1ea;
        border-color: var(--accent);
      }

      #settle-btn {
        display: none;
      }

      .width-label {
        margin-left: auto;
        font: 12px/1 "SF Mono", ui-monospace, monospace;
        color: var(--muted);
        letter-spacing: 0.02em;
      }

      #tooltip {
        position: fixed;
        display: none;
        padding: 7px 10px;
        background: rgba(32, 27, 24, 0.92);
        color: #f5f1ea;
        font: 11px/1.6 "SF Mono", ui-monospace, monospace;
        border-radius: 6px;
        pointer-events: none;
        white-space: pre;
        z-index: 100;
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.2);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <p class="eyebrow">Pretext demo</p>
      <h1>Fluid Typography</h1>
      <p class="hint">
        Drag the right edge to reshape the container. Words spring to
        browser-accurate positions while fluid rises beneath them. Double-click
        to freeze.
      </p>
    </div>

    <canvas id="canvas"></canvas>

    <div class="controls">
      <button id="pour-btn">Pour mode</button>
      <button id="settle-btn">Settle</button>
      <span id="width-label" class="width-label"></span>
    </div>

    <div id="tooltip"></div>

    <script type="module" src="./fluid.ts"></script>
  </body>
</html>
